name: gestion_rh
description: "Application de Gestion des Ressources Humaines - STB Bank"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.69.0
  intl: ^0.19.0
  provider: ^6.1.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/stbb bank.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
